services:
  mysql:
    image: mysql:8.4
    container_name: african-leaders-connection-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: african_leaders_connection
      MYSQL_USER: alc_user
      MYSQL_PASSWORD: change_this_password
      MYSQL_ROOT_PASSWORD: root_change_this_password
    ports:
      - "3306:3306"
    volumes:
      - alc_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  alc_mysql_data:
